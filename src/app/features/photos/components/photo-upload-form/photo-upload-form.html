<mat-card class="upload-card">
  <app-photo-preview />

  <form class="upload-form" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="outline">
      <mat-label>Rider name</mat-label>
      <input matInput name="riderName" [(ngModel)]="riderName" placeholder="Enter rider name" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Notes</mat-label>
      <textarea
        matInput
        name="notes"
        [(ngModel)]="notes"
        placeholder="Enter notes"
        rows="4"
      ></textarea>
    </mat-form-field>

    <button mat-raised-button type="submit">Submit</button>
  </form>
</mat-card>
